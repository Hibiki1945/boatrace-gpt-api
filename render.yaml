services:
  - type: web
    name: boatrace-gpt-api
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python boatrace_action_server.py --host 0.0.0.0"
    healthCheckPath: "/health"
    envVars:
      - key: BOATRACE_ACTION_API_KEY
        sync: false
